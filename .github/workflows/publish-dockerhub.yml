name: Publish Dockerhub

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          echo "git_commit_hash_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "source_date_epoch=$(git log -1 --format=%ct)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: nethermindeth/pluto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          build-args: |
            GIT_COMMIT_HASH_SHORT=${{ steps.meta.outputs.git_commit_hash_short }}
            SOURCE_DATE_EPOCH=${{ steps.meta.outputs.source_date_epoch }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate image
        run: |
          image_name="nethermindeth/pluto:${{ steps.docker_meta.outputs.version }}"
          output=$(docker run --rm "$image_name" -h 2>&1)
          first_line=$(echo "$output" | head -n1)
          expected="Pluto - Proof of Stake Ethereum Distributed Validator Client"
          if [[ "$first_line" != "$expected" ]]; then
            echo "::error::Unexpected message, got: '$first_line'"
            exit 1
          fi

      - name: Generate attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: docker.io/nethermindeth/pluto
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
